version: '3.8'

services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: gsc-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-gsc_db}
    ports:
      - "5432:5432" # Puedes comentar esto si no necesitas acceso externo a la DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gsc_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: gsc-redis
    restart: always
    # ports:
    #   - "6379:6379" # Redis interno, no necesita exposición externa

  # Backend NestJS
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gsc-api
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-admin123}@db:5432/${DB_NAME:-gsc_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - uploads_data:/app/uploads
    # ports:
    #   - "3000:3000" # Nginx lo servirá vía puerto 80, no hace falta exponerlo
    depends_on:
      db:
        condition: service_healthy

  # Frontend React (Nginx)
  frontend:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_DATABASE_MODE=${VITE_DATABASE_MODE:-nestjs}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    container_name: gsc-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
