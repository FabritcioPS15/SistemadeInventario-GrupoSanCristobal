version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    container_name: inventario-db
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecurePassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inventario"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    container_name: inventario-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: inventario
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-SecurePassword123}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (Vite/React)
  frontend:
    container_name: inventario-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
